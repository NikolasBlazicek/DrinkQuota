<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DrinkQuota">
    <title>DrinkQuota</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://nikolasblazicek.github.io/DrinkQuota/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-blur: 20px;
            --accent-blue: #007AFF;
            --text-main: #1D1D1F;
            --text-sub: #48484A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            width: 100%;
            min-height: 100svh;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0f2ff 0%, #ffffff 50%, #d1f7ff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 20px);
            overflow: hidden;
            color: var(--text-main);
        }

        /* Pozadie s ambient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }
        .orb-1 { width: 300px; height: 300px; background: #b2e2ff; top: -100px; left: -100px; }
        .orb-2 { width: 250px; height: 250px; background: #96e9ff; bottom: -50px; right: -50px; }

        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; height: 80px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 10px; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }

        /* POHÁR A WATER ENGINE */
        .glass-container {
            position: relative;
            width: 180px;
            height: 280px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 20px 20px 40px 40px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05), inset 0 0 20px rgba(255,255,255,0.5);
            display: flex;
            align-items: flex-end;
        }

        .water {
            width: 100%;
            height: 10%; /* Dynamicky menené cez JS */
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            position: relative;
            transition: height 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .wave {
            position: absolute;
            top: -15px;
            left: 0;
            width: 200%;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 120 28" fill="%234facfe" xmlns="http://www.w3.org/2000/svg"><path d="M0 15C30 15 30 0 60 0C90 0 90 15 120 15V28H0V15Z"/></svg>');
            background-size: 120px 28px;
            animation: waveAnim 3s linear infinite;
        }

        @keyframes waveAnim {
            from { transform: translateX(0); }
            to { transform: translateX(-120px); }
        }

        /* PICKER */
        .picker-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        select {
            appearance: none;
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 42px;
            font-weight: 800;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            cursor: pointer;
            outline: none;
        }

        .unit { font-size: 16px; font-weight: 600; color: var(--text-sub); display: block; }

        /* BUTTONS */
        .controls { width: 100%; max-width: 300px; margin-top: 30px; }
        .btn-run {
            width: 100%;
            padding: 20px;
            border-radius: 24px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3);
            transition: transform 0.2s;
        }
        .btn-run:active { transform: scale(0.96); }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.6);
            display: none;
            text-align: center;
            font-weight: 600;
        }

        footer {
            font-size: 12px;
            color: var(--text-sub);
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="header">
        <img src="https://nikolasblazicek.github.io/DrinkQuota/logo.png" class="logo" alt="Logo">
        <h1>DrinkQuota</h1>
    </div>

    <div class="glass-container">
        <div class="water" id="waterLevel">
            <div class="wave"></div>
        </div>
        <div class="picker-overlay">
            <div style="text-align: center;">
                <select id="timePicker" onchange="updateWater()">
                    <option value="1">1</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="45">45</option>
                    <option value="60">60</option>
                </select>
                <span class="unit">minút</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-run" id="runBtn" onclick="toggleTimer()">Run reminder</button>
        <div class="status" id="statusBox">
            Next drink in: <span id="timerDisplay">00:00</span>
        </div>
    </div>

    <footer>Made by Nikolas Blazicek © 2026</footer>

    <script>
        let timer = null;
        let isRunning = false;
        let targetTime = null;
        let intervalMinutes = 1;

        function updateWater() {
            const val = document.getElementById('timePicker').value;
            const percentage = (val / 60) * 100;
            document.getElementById('waterLevel').style.height = percentage + '%';
            intervalMinutes = parseInt(val);
        }

        async function requestNotifications() {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                return permission === 'granted';
            }
            return false;
        }

        function sendNotification(title, body) {
            if ('serviceWorker' in navigator && isRunning) {
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification(title, {
                        body: body,
                        icon: 'logo.png',
                        badge: 'logo.png',
                        tag: 'drink-notification'
                    });
                });
            }
        }

        function toggleTimer() {
            const btn = document.getElementById('runBtn');
            const status = document.getElementById('statusBox');

            if (!isRunning) {
                requestNotifications().then(granted => {
                    if (granted) {
                        isRunning = true;
                        btn.innerText = 'Stop';
                        btn.style.background = '#FF3B30';
                        status.style.display = 'block';
                        startCycle();
                        sendNotification('💧 DrinkQuota', 'Reminder started!');
                    } else {
                        alert('Povoľ notifikácie v nastaveniach Safari pre plochu.');
                    }
                });
            } else {
                isRunning = false;
                btn.innerText = 'Run reminder';
                btn.style.background = '#007AFF';
                status.style.display = 'none';
                clearTimeout(timer);
            }
        }

        function startCycle() {
            const now = Date.now();
            targetTime = now + (intervalMinutes * 60 * 1000);
            updateDisplay();
        }

        function updateDisplay() {
            if (!isRunning) return;

            const now = Date.now();
            const diff = targetTime - now;

            if (diff <= 0) {
                sendNotification('💧 DrinkQuota', 'Drink water!');
                startCycle();
                return;
            }

            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            document.getElementById('timerDisplay').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            timer = setTimeout(updateDisplay, 1000);
        }

        // Fix pre iOS background lag
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning) {
                updateDisplay();
            }
        });

        // Inicializácia vody
        updateWater();

        // Service Worker registrácia
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
